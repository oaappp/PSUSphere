{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="page-title"><h3>Login</h3></div>

<section class="section">
  <div class="card">
    <div class="card-body" style="max-width: 420px;">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Login</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
